kind = "web"
previewPath = "/"
title = "UX Camp Amsterdam"
version = "1.0.0"
id = "artifacts/ux-camp-amsterdam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21617

[services.development]
run = "pnpm --filter @workspace/ux-camp-amsterdam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ux-camp-amsterdam", "run", "build" ]
publicDir = "artifacts/ux-camp-amsterdam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21617"
BASE_PATH = "/"
